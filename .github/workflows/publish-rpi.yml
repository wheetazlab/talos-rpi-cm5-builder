name: Build and Publish Talos CM4/CM5 Image (RPi vendor kernel)

# Parallel pipeline to publish.yml. Differs in two ways:
#   1. Uses the RPi-vendor-kernel installer base produced by build-kernel-rpi.yml
#      (raspberrypi/linux rpi-6.18.y fork + 3× macb patches, fork-anchored)
#      instead of the mainline-kernel installer base from the Makefile.
#   2. Publishes a separate installer image (talos-rpi-installer-rpi-kernel) and
#      a separate release tag (suffix -talos-k-rpi) so the two kernel variants
#      coexist and can be picked per-node for upgrades.
#
# Trigger:
#   - workflow_dispatch (manual)
#   - push of a tag matching v*-rpi (e.g. v1.12.7-rpi)

on:
  push:
    tags:
      - 'v*-rpi'
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Base Talos version (e.g. v1.12.7)'
        required: false
        default: 'v1.12.7'
      installer_base:
        description: 'RPi-kernel installer base produced by build-kernel-rpi.yml'
        required: false
        default: 'ghcr.io/wheetazlab/rpi-talos:v1.12.7-k-rpi-macb'
      extra_kernel_args:
        description: 'Extra kernel args — space-separated key=value pairs (e.g. cma=256M hugepages=64)'
        required: false
        default: ''
      extra_extensions:
        description: 'Extra extension images on top of defaults (space-separated image:tag refs)'
        required: false
        default: ''
      runner:
        description: 'GitHub Actions runner (e.g. ubuntu-24.04-arm, mac-runner)'
        required: false
        default: 'ubuntu-24.04-arm'

env:
  # Default extensions baked into the installer — resolved to digests at build time
  EXTENSION_ISCSI_IMAGE: ghcr.io/siderolabs/iscsi-tools:v0.2.0
  EXTENSION_UTIL_LINUX_IMAGE: ghcr.io/siderolabs/util-linux-tools:2.41.4
  # Hardcoded for the RPi-fork pipeline. Linux 6.18.24 from raspberrypi/linux rpi-6.18.y.
  RPI_LINUX_KERNEL_VERSION: '6.18.24 (raspberrypi/linux rpi-6.18.y vendor fork)'
  # Default installer base when triggered by tag push (no workflow_dispatch input).
  RPI_INSTALLER_BASE_DEFAULT: 'ghcr.io/wheetazlab/rpi-talos:v1.12.7-k-rpi-macb'

jobs:
  # ── Resolve the Talos version once and share it across all jobs ─────────────
  resolve-version:
    runs-on: ${{ inputs.runner || 'ubuntu-24.04-arm' }}
    outputs:
      talos_version: ${{ steps.version.outputs.version }}
      patched_release_tag: ${{ steps.version.outputs.patched_release_tag }}
      installer_base: ${{ steps.version.outputs.installer_base }}
      overlay_image: ${{ steps.version.outputs.overlay_image }}
      linux_kernel_version: ${{ steps.version.outputs.linux_kernel_version }}
      iscsi_version: ${{ steps.version.outputs.iscsi_version }}
      util_version: ${{ steps.version.outputs.util_version }}
      extra_kernel_args: ${{ steps.version.outputs.extra_kernel_args }}
      extra_extensions: ${{ steps.version.outputs.extra_extensions }}
    steps:
      - name: Preflight disk cleanup (self-hosted safe)
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [[ -d /actions-runner/_diag ]]; then
            sudo find /actions-runner/_diag -type f -name '*.log' -mtime +2 -print -delete || true
          fi
          if [[ -d /actions-runner/_work/_temp ]]; then
            sudo rm -rf /actions-runner/_work/_temp/* || true
          fi
          echo "Disk after cleanup:"
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Talos version and metadata
        id: version
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.talos_version }}" ]]; then
            VERSION="${{ github.event.inputs.talos_version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag format: v1.12.7-rpi → strip -rpi suffix to get base Talos version
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION%-rpi}"
          else
            VERSION=$(grep '^TALOS_VERSION' Makefile | awk '{print $NF}')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Distinct release tag so the rpi-kernel build coexists with the mainline build.
          echo "patched_release_tag=${VERSION}-talos-k-rpi" >> "$GITHUB_OUTPUT"

          ISCSI=$(grep '^ISCSI_TOOLS_VERSION' Makefile | awk '{print $NF}')
          UTIL=$(grep '^UTIL_LINUX_VERSION' Makefile | awk '{print $NF}')
          OVERLAY_IMAGE=$(grep '^CUSTOM_OVERLAY_IMAGE' Makefile | awk '{print $NF}')

          # Installer base: workflow_dispatch input wins, else env default.
          INSTALLER_BASE_INPUT="${{ github.event.inputs.installer_base }}"
          if [[ -n "${INSTALLER_BASE_INPUT}" ]]; then
            INSTALLER_BASE="${INSTALLER_BASE_INPUT}"
          else
            INSTALLER_BASE="${RPI_INSTALLER_BASE_DEFAULT}"
          fi

          echo "overlay_image=${OVERLAY_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "linux_kernel_version=${RPI_LINUX_KERNEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "installer_base=${INSTALLER_BASE}" >> "$GITHUB_OUTPUT"
          echo "iscsi_version=${ISCSI}" >> "$GITHUB_OUTPUT"
          echo "util_version=${UTIL}" >> "$GITHUB_OUTPUT"
          echo "extra_kernel_args=${{ github.event.inputs.extra_kernel_args }}" >> "$GITHUB_OUTPUT"
          echo "extra_extensions=${{ github.event.inputs.extra_extensions }}" >> "$GITHUB_OUTPUT"


  # ── Build image + installer ─────────────────────────────────────────────────
  build:
    runs-on: ${{ inputs.runner || 'ubuntu-24.04-arm' }}
    needs: [resolve-version]
    permissions:
      contents: read
      packages: write
    env:
      DOCKER: docker
      TALOS_VERSION: ${{ needs.resolve-version.outputs.talos_version }}
      PATCHED_RELEASE_TAG: ${{ needs.resolve-version.outputs.patched_release_tag }}
      REGISTRY: ghcr.io
      REGISTRY_USERNAME: ${{ github.repository_owner }}
    steps:
      - name: Preflight disk cleanup (self-hosted safe)
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [[ -d /actions-runner/_diag ]]; then
            sudo find /actions-runner/_diag -type f -name '*.log' -mtime +2 -print -delete || true
          fi
          if [[ -d /actions-runner/_work/_temp ]]; then
            sudo rm -rf /actions-runner/_work/_temp/* || true
          fi
          echo "Disk after cleanup:"
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4
        with:
          version: v0.20.5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Install dependencies
        run: sudo apt-get install -y xz-utils

      - name: Resolve extension digests
        id: extensions
        env:
          EXTRA_EXTENSIONS: ${{ needs.resolve-version.outputs.extra_extensions }}
        run: |
          RESOLVED=""
          for IMAGE in ${EXTENSION_ISCSI_IMAGE} ${EXTENSION_UTIL_LINUX_IMAGE} ${EXTRA_EXTENSIONS}; do
            DIGEST=$(crane digest "${IMAGE}")
            RESOLVED="${RESOLVED} ${IMAGE}@${DIGEST}"
          done
          echo "list=${RESOLVED# }" >> "$GITHUB_OUTPUT"

      - name: Resolve overlay digest
        id: overlay
        run: |
          DIGEST=$(crane digest "${{ needs.resolve-version.outputs.overlay_image }}")
          echo "image=${{ needs.resolve-version.outputs.overlay_image }}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Build kernel-arg flags
        id: kargs
        env:
          EXTRA_KARGS: ${{ needs.resolve-version.outputs.extra_kernel_args }}
        run: |
          FLAGS=""
          for arg in ${EXTRA_KARGS}; do
            FLAGS="${FLAGS} --extra-kernel-arg=${arg}"
          done
          echo "flags=${FLAGS# }" >> "$GITHUB_OUTPUT"

      - name: Build Talos image
        env:
          EXTENSIONS: ${{ steps.extensions.outputs.list }}
          EXTRA_KERNEL_ARGS: ${{ steps.kargs.outputs.flags }}
        run: |
          # Build extension flags
          EXT_ARGS=""
          for img in ${EXTENSIONS}; do
            EXT_ARGS="${EXT_ARGS} --system-extension-image=${img}"
          done

          # Use a Docker named volume — lives in the Docker VM, no macOS/DinD bind-mount issues
          docker volume create talos-image-out

          # Bash array avoids backslash continuations (mac-runner DinD compat)
          DOCKER_ARGS=(
            run --rm
            -v /dev:/dev
            --privileged
            -v talos-image-out:/out
            "ghcr.io/${REGISTRY_USERNAME}/imager-rpi:${TALOS_VERSION}-rpi"
            rpi_generic
            "--base-installer-image=${{ needs.resolve-version.outputs.installer_base }}"
            "--overlay-image=${{ steps.overlay.outputs.image }}"
            --overlay-name=rpi_generic
            ${EXT_ARGS}
            ${EXTRA_KERNEL_ARGS}
            --arch arm64
          )
          docker "${DOCKER_ARGS[@]}"

          # Copy disk image to runner filesystem via container stdout (not a bind mount)
          docker run --rm -v talos-image-out:/src alpine \
            cat /src/metal-arm64.raw.xz > /tmp/metal-arm64.raw.xz

          docker volume rm talos-image-out

      - name: Build installer and push to GHCR
        env:
          EXTENSIONS: ${{ steps.extensions.outputs.list }}
          EXTRA_KERNEL_ARGS: ${{ steps.kargs.outputs.flags }}
        run: |
          # Build extension flags
          EXT_ARGS=""
          for img in ${EXTENSIONS}; do
            EXT_ARGS="${EXT_ARGS} --system-extension-image=${img}"
          done

          # Use a Docker named volume — lives in the Docker VM, no macOS bind-mount issues
          docker volume create talos-installer-out

          # Bash array avoids backslash continuations (mac-runner DinD compat)
          DOCKER_ARGS=(
            run --rm
            -v /dev:/dev
            --privileged
            -v talos-installer-out:/out
            "ghcr.io/${REGISTRY_USERNAME}/imager-rpi:${TALOS_VERSION}-rpi"
            installer
            "--base-installer-image=${{ needs.resolve-version.outputs.installer_base }}"
            "--overlay-image=${{ steps.overlay.outputs.image }}"
            --overlay-name=rpi_generic
            ${EXT_ARGS}
            ${EXTRA_KERNEL_ARGS}
            --arch arm64
          )
          docker "${DOCKER_ARGS[@]}"

          # Copy installer tar to runner filesystem via container stdout (not a bind mount)
          docker run --rm -v talos-installer-out:/src alpine \
            cat /src/installer-arm64.tar > /tmp/installer.tar

          docker volume rm talos-installer-out

          # Push via crane (already authenticated). Distinct image name from the
          # mainline pipeline (talos-rpi-installer) so both kernel variants
          # coexist and can be selected per-node for upgrades.
          crane push /tmp/installer.tar \
            ghcr.io/${{ env.REGISTRY_USERNAME }}/talos-rpi-installer-rpi-kernel:${{ env.PATCHED_RELEASE_TAG }}

      - name: Upload disk image
        uses: actions/upload-artifact@v4
        with:
          name: metal-arm64-rpi-kernel
          path: /tmp/metal-arm64.raw.xz

      - name: Postflight BuildKit cleanup
        if: always()
        run: |
          set +e
          docker ps -a --format '{{.Names}}' | grep '^buildx_buildkit_' | xargs -r docker rm -f
          docker volume ls --format '{{.Name}}' | grep '^buildx_buildkit_.*_state$' | xargs -r docker volume rm
          docker builder prune -af || true
          docker system prune -af --volumes || true
          df -h

  # ── Create GitHub release ───────────────────────────────────────────────────
  release:
    runs-on: ${{ inputs.runner || 'ubuntu-24.04-arm' }}
    needs: [resolve-version, build]
    permissions:
      contents: write
    env:
      TALOS_VERSION: ${{ needs.resolve-version.outputs.talos_version }}
      PATCHED_RELEASE_TAG: ${{ needs.resolve-version.outputs.patched_release_tag }}
      INSTALLER_BASE: ${{ needs.resolve-version.outputs.installer_base }}
      OVERLAY_IMAGE: ${{ needs.resolve-version.outputs.overlay_image }}
      LINUX_KERNEL_VERSION: ${{ needs.resolve-version.outputs.linux_kernel_version }}
      ISCSI_VERSION: ${{ needs.resolve-version.outputs.iscsi_version }}
      UTIL_VERSION: ${{ needs.resolve-version.outputs.util_version }}
      REGISTRY: ghcr.io
      REGISTRY_USERNAME: ${{ github.repository_owner }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Preflight disk cleanup (self-hosted safe)
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [[ -d /actions-runner/_diag ]]; then
            sudo find /actions-runner/_diag -type f -name '*.log' -mtime +2 -print -delete || true
          fi
          if [[ -d /actions-runner/_work/_temp ]]; then
            sudo rm -rf /actions-runner/_work/_temp/* || true
          fi
          echo "Disk after cleanup:"
          df -h

      - name: Download disk image artifact
        uses: actions/download-artifact@v4
        with:
          name: metal-arm64-rpi-kernel
          path: _out/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(cat <<'EOF'
          > ⚠️ Experimental build — use at your own risk.

          Patched Talos build for **Raspberry Pi CM4, CM5, Pi 4, and Pi 5** boards — **RPi vendor kernel variant**.

          This release is the sibling of `${{ env.TALOS_VERSION }}-talos-rpi` but built on the **`raspberrypi/linux` rpi-6.18.y vendor fork** instead of the mainline `siderolabs/linux` kernel. Use this variant on boards where the Pi vendor fork's BCM2712/RP1 fixes matter (e.g. CM5 nodes with macb/PCIe instability).

          Combines four independent layers on top of upstream Talos ${{ env.TALOS_VERSION }}:

          1. **Custom Linux kernel** (`${{ env.LINUX_KERNEL_VERSION }}`) — `raspberrypi/linux` rpi-6.18.y vendor fork rebuilt with three `net: macb` patches (fork-anchored, vendored from [lukaszraczylo/talos-builder](https://github.com/lukaszraczylo/talos-builder); same series posted to netdev as `[RFC PATCH net-next 0/3] net: macb: candidate fixes for silent TX stall on BCM2712/RP1`; addresses [sbc-raspberrypi#82](https://github.com/siderolabs/sbc-raspberrypi/issues/82) / [sbc-raspberrypi#91](https://github.com/siderolabs/sbc-raspberrypi/issues/91) / [cilium#43198](https://github.com/cilium/cilium/issues/43198)):
             - `net: macb: flush PCIe posted write after TSTART doorbell` — prevents TX hangs caused by posted-write reordering across the PCIe bridge.
             - `net: macb: re-check ISR after IER re-enable in macb_tx_poll` — closes a race window where a TX interrupt fires between ISR read and IER re-enable, masking the event.
             - `net: macb: add TX stall watchdog to recover from lost TCOMP` — defence-in-depth safety net (fork-anchored variant: anchored on `bool tx_pending` field present only in `raspberrypi/linux`).
          2. **`rpi_generic` SBC overlay** (`${{ env.OVERLAY_IMAGE }}`, [siderolabs/sbc-raspberrypi PR #88](https://github.com/siderolabs/sbc-raspberrypi/pull/88) by [@appkins](https://github.com/appkins)) — U-Boot + RP1/BCM2712 device-tree support enabling NVMe boot, CM4IO/CM5IO carrier boards, and Pi 5 single-board form factor.
          3. **CM5 SD card-detect DTB patch** — drops `broken-cd;` from the `&sdio1` node in `bcm2712-rpi-cm5.dtsi` (injected at overlay build time as `0011-cm5-sdio1-drop-broken-cd.patch`). Upstream `broken-cd;` forces `MMC_CAP_NEEDS_POLL`, which prevents `mmc_rescan()` from short-circuiting on an empty microSD slot and produces a perpetual `mmc0: Timeout waiting for hardware cmd interrupt` log loop on NVMe-only boots. The BCM2712 SDHCI controller's native `SDHCI_CARD_PRESENT` bit and `CARD_INSERT/REMOVE` interrupts handle empty-slot quiet and hot-insert correctly without `broken-cd`. Verified on CM4IO, CM5IO, and DeskPi Super6C.
          4. **Extensions** — `iscsi-tools` (iSCSI initiator for Longhorn/OpenEBS) and `util-linux-tools` (loopback/filesystem utilities) baked in at digest-pinned versions.

          ### Components

          | Component | Version / Image |
          |-----------|------------------|
          | Talos | `${{ env.TALOS_VERSION }}` |
          | Imager | `ghcr.io/${{ env.REGISTRY_USERNAME }}/imager-rpi:${{ env.TALOS_VERSION }}-rpi` (patched — RPi 16K kernel) |
          | Installer base | `${{ env.INSTALLER_BASE }}` (RPi vendor kernel — built by `build-kernel-rpi.yml`) |
          | Kernel | Linux ${{ env.LINUX_KERNEL_VERSION }} + 3× macb PCIe patches (fork-anchored) |
          | SBC overlay | `${{ env.OVERLAY_IMAGE }}` (rpi_generic — PR #88 + CM5 sdio1 broken-cd drop) |
          | iscsi-tools | `ghcr.io/siderolabs/iscsi-tools:${{ env.ISCSI_VERSION }}` |
          | util-linux-tools | `ghcr.io/siderolabs/util-linux-tools:${{ env.UTIL_VERSION }}` |

          ### Supported boards

          - Raspberry Pi CM5 (CM5IO, CM4IO-compatible carriers e.g. DeskPi Super6C)
          - Raspberry Pi CM4 (CM4IO and compatible carriers)
          - Raspberry Pi 5
          - Raspberry Pi 4 Model B

          ### What's available

          - 📦 **`metal-arm64.raw.xz`** — disk image for CM4/CM5/Pi 4/Pi 5 (RPi vendor kernel)
          - ⚙️  **Installer:** `${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/talos-rpi-installer-rpi-kernel:${{ env.PATCHED_RELEASE_TAG }}`

          ### Install

          - **Fresh install**
            - Download `metal-arm64.raw.xz` from this release
            - Flash with `dd` or your favorite tool

          - **Upgrade existing node** (RPi vendor kernel)
            ```bash
            talosctl upgrade --nodes <NODE_IP> --image ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/talos-rpi-installer-rpi-kernel:${{ env.PATCHED_RELEASE_TAG }}
            ```

          EOF
          )
          gh release delete ${{ env.PATCHED_RELEASE_TAG }} --yes 2>/dev/null || true
          gh release create \
            ${{ env.PATCHED_RELEASE_TAG }} \
            ./_out/metal-arm64.raw.xz \
            --title "${{ env.PATCHED_RELEASE_TAG }}" \
            $([[ "${{ env.TALOS_VERSION }}" =~ -(alpha|beta|rc)\. ]] && echo "--prerelease") \
            --notes "$NOTES"
