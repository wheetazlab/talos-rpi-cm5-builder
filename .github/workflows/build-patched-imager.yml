name: Build RPi Kernel Imager (rpi-6.18.y)
# ─────────────────────────────────────────────────────────────────────────────
# Why the RPi Foundation kernel?
# ──────────────────────────────
# The Raspberry Pi Foundation's rpi-6.18.y branch carries both macb PCIe TX
# stall fixes natively (commits e45c98d and 316d9fe71fb1), plus hardware-
# specific driver backports and optimizations for BCM2712/RP1.  This
# eliminates the need for our custom macb patch against mainline.
#
# What this workflow does
# ──────────────────────
# 1. Build the RPi kernel using docker/build-rpi-kernel.Dockerfile:
#    a. Clones raspberrypi/linux at RPI_KERNEL_REF (branch or commit SHA)
#    b. Uses bcm2712_defconfig + kernel/talos-config-fragment
#       (adds IMA, MODULE_SIG_FORCE, KEXEC, bridge netfilter, 4K pages, NVMe=y)
#    c. Compiles vmlinuz + kernel modules (arm64)
#    d. Generates unique MODULE_SIG signing key
# 2. Push the kernel OCI to GHCR.
# 3. Build docker/patched-imager.Dockerfile which:
#    a. Extracts rootfs.sqsh from the stock Talos initramfs
#    b. Replaces kernel modules with our RPi build (properly-signed copies)
#    c. Repacks rootfs.sqsh → cpio → zstd → initramfs.xz
#    d. Copies both RPi vmlinuz and repacked initramfs into the imager
# 4. Push the patched imager OCI to GHCR.
#
# After this workflow completes (step summary shows the image tag), trigger
# "Build and Publish Talos CM5 Image" — it picks up the imager automatically.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version to patch — must match TALOS_VERSION in Makefile'
        required: false
        default: 'v1.12.4'
      rpi_kernel_ref:
        description: 'raspberrypi/linux git ref (branch, tag, or SHA). Use branch name for latest, or pin to a SHA for reproducibility.'
        required: false
        default: 'rpi-6.18.y'

jobs:
  build:
    name: Build RPi kernel + assemble patched imager
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    permissions:
      packages: write
      contents: read

    env:
      TALOS_VERSION:  ${{ github.event.inputs.talos_version || 'v1.12.4' }}
      RPI_KERNEL_REF: ${{ github.event.inputs.rpi_kernel_ref || 'rpi-6.18.y' }}
      IMAGE_PREFIX:   ghcr.io/${{ github.repository_owner }}/talos-rpi-cm5-builder

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout talos-rpi-cm5-builder
        uses: actions/checkout@v4

      # ── Docker buildx ───────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Compute image tags ──────────────────────────────────────────────────
      - name: Compute image tags
        id: tags
        run: |
          VER=$(echo "${{ env.TALOS_VERSION }}" | tr -d 'v')
          KERNEL_TAG="${{ env.IMAGE_PREFIX }}/kernel:${VER}-rpi-kernel"
          IMAGER_TAG="${{ env.IMAGE_PREFIX }}/imager:${VER}-rpi-kernel"
          echo "kernel=${KERNEL_TAG}" >> "$GITHUB_OUTPUT"
          echo "imager=${IMAGER_TAG}" >> "$GITHUB_OUTPUT"
          echo "Kernel image : ${KERNEL_TAG}"
          echo "Imager image : ${IMAGER_TAG}"

      # ── Build RPi kernel ────────────────────────────────────────────────────
      - name: Build RPi kernel from ${{ env.RPI_KERNEL_REF }} (~40–90 min)
        run: |
          docker buildx build \
            --file=docker/build-rpi-kernel.Dockerfile \
            --platform=linux/arm64 \
            --provenance=false \
            --target=kernel \
            --tag="${{ steps.tags.outputs.kernel }}" \
            --push \
            --build-arg="RPI_KERNEL_REF=${{ env.RPI_KERNEL_REF }}" \
            .

      # ── Assemble patched imager ─────────────────────────────────────────────
      - name: Build & push patched imager
        run: |
          docker buildx build \
            --file=docker/patched-imager.Dockerfile \
            --platform=linux/arm64 \
            --provenance=false \
            --tag="${{ steps.tags.outputs.imager }}" \
            --push \
            --build-arg="BASE_IMAGER=ghcr.io/siderolabs/imager:${{ env.TALOS_VERSION }}" \
            --build-arg="KERNEL_IMAGE=${{ steps.tags.outputs.kernel }}" \
            .

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## RPi kernel imager ✅

          Set `custom_imager` when triggering **Build and Publish Talos CM5 Image**:

          SUMMARY
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "custom_imager: ${{ steps.tags.outputs.imager }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY

          | Detail | Value |
          |--------|-------|
          | Kernel source | \`raspberrypi/linux@${{ env.RPI_KERNEL_REF }}\` |
          | Base config | \`bcm2712_defconfig\` + \`kernel/talos-config-fragment\` |
          | Base imager | \`ghcr.io/siderolabs/imager:${{ env.TALOS_VERSION }}\` |

          The patched imager will be used for:
          - \`make build\` → disk image (\`metal-arm64.raw.xz\`) with RPi kernel
          - \`make installer\` → CM5 upgrade installer OCI with RPi kernel

          No re-run is needed after each Talos point release unless the kernel version changes.

          <details>
          <summary>Intermediate kernel image (informational)</summary>

          \`${{ steps.tags.outputs.kernel }}\`

          </details>
          SUMMARY
