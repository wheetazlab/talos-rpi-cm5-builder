name: Build Patched Kernel Installer Base

# Builds a custom installer-base OCI image using the standard siderolabs/pkgs
# kernel with three macb ethernet patches applied on top (PCIe flush, ISR
# re-check, TX stall watchdog — fixes silent TX stalls on BCM2712/RP1).
#
# Output: ghcr.io/wheetazlab/rpi-talos:<installer_tag>
#   e.g.  ghcr.io/wheetazlab/rpi-talos:v1.12.7-k-macb
#
# After a successful run, update CUSTOM_INSTALLER_BASE in the Makefile to use
# the new image so the main publish workflow picks it up.
#
# Trigger:
#   - workflow_dispatch  (manual, inputs below)
#   - push of a tag matching v*-kernel  (e.g. v1.12.7-kernel)

on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version (e.g. v1.12.7)'
        required: false
        default: 'v1.12.7'
      pkg_version:
        description: 'siderolabs/pkgs ref — branch, tag, or git-describe (e.g. v1.12.0-58-g86d6af1)'
        required: false
        default: 'v1.12.0-58-g86d6af1'
      pkgs_macb_pr:
        description: 'siderolabs/pkgs PR number containing canonical macb patch set'
        required: false
        default: '1526'
      installer_tag:
        description: 'Output image tag (e.g. v1.12.7-k-macb)'
        required: false
        default: 'v1.12.7-k-macb'
      runner:
        description: 'GitHub Actions runner (e.g. ubuntu-24.04-arm, mac-runner)'
        required: false
        default: 'ubuntu-24.04-arm'
  push:
    tags:
      - 'v*-kernel'

jobs:
  build:
    runs-on: ${{ inputs.runner || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      REGISTRY_USERNAME: ${{ github.repository_owner }}

    steps:
      - name: Preflight disk cleanup (self-hosted safe)
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [[ -d /actions-runner/_diag ]]; then
            sudo find /actions-runner/_diag -type f -name '*.log' -mtime +2 -print -delete || true
          fi
          if [[ -d /actions-runner/_work/_temp ]]; then
            sudo rm -rf /actions-runner/_work/_temp/* || true
          fi
          echo "Disk after cleanup:"
          df -h

      - name: Checkout talos-rpi-cm5-builder
        uses: actions/checkout@v4

      - name: Set up Git identity (required for git am)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4
        with:
          version: v0.20.5

      - name: Resolve versions
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag format: v1.12.7-kernel → extract v1.12.7
            TAG="${{ github.ref_name }}"
            TALOS_VERSION=$(echo "$TAG" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
            PKG_VERSION="v1.12.0-58-g86d6af1"
            PKGS_MACB_PR="1526"
            INSTALLER_TAG="${TALOS_VERSION}-k-macb"
          else
            TALOS_VERSION="${{ github.event.inputs.talos_version }}"
            PKG_VERSION="${{ github.event.inputs.pkg_version }}"
            PKGS_MACB_PR="${{ github.event.inputs.pkgs_macb_pr }}"
            INSTALLER_TAG="${{ github.event.inputs.installer_tag }}"
          fi
          echo "talos_version=${TALOS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkgs_macb_pr=${PKGS_MACB_PR}" >> "$GITHUB_OUTPUT"
          echo "installer_tag=${INSTALLER_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved: Talos=${TALOS_VERSION}  pkgs=${PKG_VERSION}  macb-pr=#${PKGS_MACB_PR}  tag=${INSTALLER_TAG}"

      # ── siderolabs/pkgs: standard Talos kernel + macb patches ──────────────

      - name: Clone siderolabs/pkgs
        run: |
          git clone https://github.com/siderolabs/pkgs.git checkouts/pkgs
          # Resolve git-describe refs (e.g. v1.12.0-58-g86d6af1 → 86d6af1)
          PKG_REF="${{ steps.ver.outputs.pkg_version }}"
          [[ "$PKG_REF" =~ -[0-9]+-g([0-9a-f]+)$ ]] && PKG_REF="${BASH_REMATCH[1]}"
          git -C checkouts/pkgs -c advice.detachedHead=false checkout "$PKG_REF"

      - name: Import macb kernel patches from pkgs PR
        run: |
          git -C checkouts/pkgs fetch origin pull/${{ steps.ver.outputs.pkgs_macb_pr }}/head:pr-macb
          git -C checkouts/pkgs checkout pr-macb -- \
            kernel/build/patches/0001-net-macb-flush-PCIe-posted-write-after-TSTART-doorbe.patch \
            kernel/build/patches/0002-net-macb-re-check-ISR-after-IER-re-enable-in-macb_tx.patch \
            kernel/build/patches/0003-net-macb-add-TX-stall-watchdog-as-defence-in-depth-s.patch
          ls -1 checkouts/pkgs/kernel/build/patches/000*-net-macb-*.patch

      - name: Build kernel (siderolabs/pkgs)
        run: |
          cd checkouts/pkgs
          make \
            REGISTRY=${{ env.REGISTRY }} \
            USERNAME=${{ env.REGISTRY_USERNAME }} \
            PUSH=true \
            PLATFORM=linux/arm64 \
            kernel

      - name: Get pkgs tag
        id: pkgs
        run: |
          echo "tag=$(cd checkouts/pkgs && git describe --tag --always --dirty --match 'v[0-9]*')" >> "$GITHUB_OUTPUT"

      # ── siderolabs/talos: installer-base with macb-patched kernel ────────────

      - name: Clone siderolabs/talos
        run: |
          git clone -c advice.detachedHead=false \
            --branch "${{ steps.ver.outputs.talos_version }}" \
            https://github.com/siderolabs/talos.git checkouts/talos

      - name: Build and push installer-base
        run: |
          cd checkouts/talos
          make \
            TAG=${{ steps.ver.outputs.talos_version }} \
            REGISTRY=${{ env.REGISTRY }} \
            USERNAME=${{ env.REGISTRY_USERNAME }} \
            PUSH=true \
            PKG_KERNEL=${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/kernel:${{ steps.pkgs.outputs.tag }} \
            INSTALLER_ARCH=arm64 \
            PLATFORM=linux/arm64 \
            installer-base

      # ── Publish under stable rpi-talos name ───────────────────────────────

      - name: Publish as rpi-talos
        run: |
          crane copy \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/installer-base:${{ steps.ver.outputs.talos_version }} \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/rpi-talos:${{ steps.ver.outputs.installer_tag }}

      - name: Postflight BuildKit cleanup
        if: always()
        run: |
          set +e
          docker ps -a --format '{{.Names}}' | grep '^buildx_buildkit_' | xargs -r docker rm -f
          docker volume ls --format '{{.Name}}' | grep '^buildx_buildkit_.*_state$' | xargs -r docker volume rm
          docker builder prune -af || true
          docker system prune -af --volumes || true
          df -h

      - name: Summary
        run: |
          echo "## Patched Kernel Installer Base Built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Talos | \`${{ steps.ver.outputs.talos_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| pkgs | \`${{ steps.ver.outputs.pkg_version }}\` @ \`${{ steps.pkgs.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| macb patch source | \`siderolabs/pkgs#${{ steps.ver.outputs.pkgs_macb_pr }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kernel | standard siderolabs/pkgs (mainline stable) + 3 macb patches from PR |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kernel OCI | \`${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/kernel:${{ steps.pkgs.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| installer-base | \`${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/installer-base:${{ steps.ver.outputs.talos_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **rpi-talos (use this)** | \`${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/rpi-talos:${{ steps.ver.outputs.installer_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Set in Makefile: \`CUSTOM_INSTALLER_BASE ?= ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/rpi-talos:${{ steps.ver.outputs.installer_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
