name: Build Custom SBC Overlay (mainline kernel)

# Builds a custom ghcr.io/wheetazlab/sbc-raspberrypi overlay using DTBs from
# a raspberrypi/linux stable_* tag to match the mainline Talos kernel used by
# publish.yml.
#
# Run this manually whenever you want to refresh the mainline overlay.
# Update CUSTOM_OVERLAY_IMAGE in the Makefile to use the new tag.

on:
  workflow_dispatch:
    inputs:
      pr88_sha:
        description: 'sidero-community/sbc-raspberrypi commit SHA (overlay source, PR #88 lineage)'
        required: false
        default: 'e5ab77462b5ed1ee594ae71f35c0262b51a72524'
      overlay_tag:
        description: 'Tag for the overlay image (e.g. pr88-mainline-cd1, pr88-mainline-cd2)'
        required: false
        default: 'pr88-mainline-cd4'
      uboot_version:
        description: 'u-boot/u-boot source version (for u-boot-<ver>.tar.bz2)'
        required: false
        default: '2026.01'
      uboot_sha256:
        description: 'sha256 for https://ftp.denx.de/pub/u-boot/u-boot-<ver>.tar.bz2'
        required: false
        default: 'b60d5865cefdbc75da8da4156c56c458e00de75a49b80c1a2e58a96e30ad0d54'
      uboot_sha512:
        description: 'sha512 for https://ftp.denx.de/pub/u-boot/u-boot-<ver>.tar.bz2'
        required: false
        default: 'b1f988a497c77da60faf89ed33034e9ae58c4cd7f208e5ce451f1372e13540a66289bee4f08ca2f68f105d73f1ceae058b1f713db549edbcc885d9c66bdc4f8b'
      rpi_dtb_ref:
        description: 'raspberrypi/linux stable_* tag for mainline DTB packaging'
        required: false
        default: 'stable_20250428'
      rpi_dtb_sha256:
        description: 'sha256 for raspberrypi/linux tarball at rpi_dtb_ref'
        required: false
        default: 'c95906cfbc7808de5860c6d86537bea22e3501f600a5209de59a86cb436886f6'
      rpi_dtb_sha512:
        description: 'sha512 for raspberrypi/linux tarball at rpi_dtb_ref'
        required: false
        default: '0ed5d490c491e590b5980dccf6fcac0dd3c47accbfacd40d91507c12801cff34fa6a1c68991c8a6c57bb259c909121414766f35a0b11c4bd5d62c3e11d710839'
      runner:
        description: 'GitHub Actions runner (e.g. ubuntu-24.04-arm, mac-runner)'
        required: false
        default: 'ubuntu-24.04-arm'

jobs:
  build-overlay:
    runs-on: ${{ inputs.runner || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Preflight disk cleanup (self-hosted safe)
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [[ -d /actions-runner/_diag ]]; then
            sudo find /actions-runner/_diag -type f -name '*.log' -mtime +2 -print -delete || true
          fi
          if [[ -d /actions-runner/_work/_temp ]]; then
            sudo rm -rf /actions-runner/_work/_temp/* || true
          fi
          echo "Disk after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout this repo (for local DTB patches)
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone sidero-community/sbc-raspberrypi at PR #88
        run: |
          rm -rf sbc-raspberrypi
          git clone https://github.com/sidero-community/sbc-raspberrypi
          cd sbc-raspberrypi
          git fetch --depth=1 origin ${{ github.event.inputs.pr88_sha }} || true
          git checkout ${{ github.event.inputs.pr88_sha }}

      - name: Patch overlay internals (U-Boot + DTB pins)
        run: |
          cd sbc-raspberrypi

          # Keep Talos kernel unchanged; only adjust overlay internals.
          sed -i -E "s|^([[:space:]]*uboot_version:[[:space:]]*).*$|\1${{ github.event.inputs.uboot_version }}|" Pkgfile
          sed -i -E "s|^([[:space:]]*uboot_sha256:[[:space:]]*).*$|\1${{ github.event.inputs.uboot_sha256 }}|" Pkgfile
          sed -i -E "s|^([[:space:]]*uboot_sha512:[[:space:]]*).*$|\1${{ github.event.inputs.uboot_sha512 }}|" Pkgfile
          sed -i -E "s|^([[:space:]]*raspberrypi_kernel_version:[[:space:]]*).*$|\1${{ github.event.inputs.rpi_dtb_ref }}|" Pkgfile
          sed -i -E "s|^([[:space:]]*raspberrypi_kernel_sha256:[[:space:]]*).*$|\1${{ github.event.inputs.rpi_dtb_sha256 }}|" Pkgfile
          sed -i -E "s|^([[:space:]]*raspberrypi_kernel_sha512:[[:space:]]*).*$|\1${{ github.event.inputs.rpi_dtb_sha512 }}|" Pkgfile
          sed -i -E "s|https://github.com/raspberrypi/linux/archive/refs/tags/\{\{ \.raspberrypi_kernel_version \}\}\.tar\.gz|https://github.com/raspberrypi/linux/archive/\{\{ .raspberrypi_kernel_version \}\}\.tar\.gz|g" artifacts/dtb/raspberrypi/pkg.yaml

      - name: Inject local DTB patches (post-0006 ordering)
        run: |
          set -euo pipefail
          cd sbc-raspberrypi
          mkdir -p artifacts/dtb/raspberrypi/patches
          cp -v "${GITHUB_WORKSPACE}/builder/patches/dtb/0011-cm5-sdio1-drop-broken-cd.patch" \
            artifacts/dtb/raspberrypi/patches/0011-cm5-sdio1-drop-broken-cd.patch

          # Rewrite the patch loop in pkg.yaml to be forward-aware:
          #   - forward-applicable -> apply  (mainline: patch not yet present)
          #   - already applied    -> skip   (patch already in source)
          #   - genuinely broken   -> fail   (real context drift)
          awk '
            /patch -p1 < \$patch \|\| \(echo "Failed/ {
              print "          if patch -p1 --dry-run < $patch > /dev/null 2>&1; then"
              print "            patch -p1 < $patch"
              print "          elif patch -p1 --dry-run -R < $patch > /dev/null 2>&1; then"
              print "            echo \"(already applied, skipping)\""
              print "          else"
              print "            echo \"Failed to apply patch $patch\" && exit 1"
              print "          fi"
              next
            }
            { print }
          ' artifacts/dtb/raspberrypi/pkg.yaml > /tmp/pkg.yaml.new \
            && mv /tmp/pkg.yaml.new artifacts/dtb/raspberrypi/pkg.yaml

          # Sanity-check all patches against the actual kernel source.
          # Uses the same forward-aware logic as the pkg.yaml loop above.
          tmp=$(mktemp -d)
          trap 'rm -rf "${tmp}"' EXIT
          ref="${{ github.event.inputs.rpi_dtb_ref }}"
          curl -fsSL "https://github.com/raspberrypi/linux/archive/${ref}.tar.gz" \
            | tar -xz -C "${tmp}" --strip-components=1
          cd "${tmp}"
          for p in "${GITHUB_WORKSPACE}/sbc-raspberrypi/artifacts/dtb/raspberrypi/patches/"*.patch; do
            name=$(basename "$p")
            if patch -p1 --dry-run < "$p" > /dev/null 2>&1; then
              echo "--> apply ${name}"
              patch -p1 < "$p"
            elif patch -p1 --dry-run -R < "$p" > /dev/null 2>&1; then
              echo "--> ${name}: already in source, skipping"
            else
              echo "ERROR: ${name} failed — not forward-applicable and not already applied"
              patch -p1 < "$p"
              exit 1
            fi
          done

      - name: Build and push custom overlay
        run: |
          cd sbc-raspberrypi
          make sbc-raspberrypi \
            REGISTRY=ghcr.io \
            USERNAME=${{ github.repository_owner }} \
            TAG=${{ github.event.inputs.overlay_tag }} \
            PLATFORM=linux/arm64 \
            PUSH=true

      - name: Postflight BuildKit cleanup
        if: always()
        run: |
          set +e
          docker ps -a --format '{{.Names}}' | grep '^buildx_buildkit_' | xargs -r docker rm -f
          docker volume ls --format '{{.Name}}' | grep '^buildx_buildkit_.*_state$' | xargs -r docker volume rm
          docker builder prune -af || true
          docker system prune -af --volumes || true
          df -h

      - name: Summary
        run: |
          echo "## Custom SBC Overlay Built (mainline kernel)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | sidero-community/sbc-raspberrypi @ \`${{ github.event.inputs.pr88_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| U-Boot | \`${{ github.event.inputs.uboot_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DTB ref | \`${{ github.event.inputs.rpi_dtb_ref }}\` (mainline stable tag) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`ghcr.io/${{ github.repository_owner }}/sbc-raspberrypi:${{ github.event.inputs.overlay_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Update \`CUSTOM_OVERLAY_IMAGE\` in the Makefile to use this new tag." >> "$GITHUB_STEP_SUMMARY"
